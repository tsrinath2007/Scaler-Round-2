name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Try pushing to main
          git push --force https://tsrinath:$HF_TOKEN@huggingface.co/spaces/tsrinath/Scaler-Round-2 main:main || \
          # If that fails, try pushing to master
          git push --force https://tsrinath:$HF_TOKEN@huggingface.co/spaces/tsrinath/Scaler-Round-2 main:master
